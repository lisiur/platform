# nginx reverse-proxy config for the next101 monorepo.
#
# The three Next.js apps run under PM2 on localhost:
#   gateway       :3000  -> serves /api (Hono) + the root page
#   admin         :3001  -> basePath /admin, assetPrefix /admin-static
#   organization  :3002  -> basePath /organization, assetPrefix /organization-static
#
# In dev, apps/gateway proxies /admin & /organization to the other apps, but
# those rewrites are dev-only, so in production nginx does the routing.
#
# Merge the `location` blocks below into your existing `server { }` block
# (the one that terminates TLS for your domain). Keep your existing
# listen / server_name / SSL / etc. directives as they are.

# --------------------------------------------------------------------------
# Shared proxy headers. Either inline these in each location (as done below)
# or move them into /etc/nginx/snippets/next-proxy.conf and `include` it.
# --------------------------------------------------------------------------
# proxy_http_version 1.1;
# proxy_set_header Host $host;
# proxy_set_header X-Real-IP $remote_addr;
# proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# proxy_set_header X-Forwarded-Proto $scheme;
# proxy_set_header Upgrade $http_upgrade;
# proxy_set_header Connection "upgrade";

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ... your existing SSL certificate / proxy_* / etc. directives ...

    # --- Admin UI (basePath /admin) ----------------------------------------
    location /admin-static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Organization UI (basePath /organization) -------------------------
    location /organization-static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /organization {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Default: gateway (API at /api + root page) -----------------------
    # nginx longest-prefix matching means /admin*, /organization*, and their
    # static prefixes above win over this catch-all, so /api and / reach the
    # gateway. proxy_pass without a trailing URI preserves the original path
    # so each app's basePath keeps working.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
